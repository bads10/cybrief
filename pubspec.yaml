name: cybrief
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.1+8

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  google_fonts: ^8.0.2
  lucide_icons_flutter: ^3.1.10
  http: ^1.2.2
  webview_flutter: ^4.10.0
  shared_preferences: ^2.3.3
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.5
  url_launcher: ^6.3.0
  lottie: ^3.1.0
  purchases_flutter: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon-cybrief.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#0F172A"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/logo-cybrief.png"

# Écran de lancement (splash) — logo cybrief sur fond de marque, iOS + Android
flutter_native_splash:
  color: "#0F172A"
  image: assets/images/logo-cybrief.png
  web: false
  android_12:
    color: "#0F172A"
    image: assets/images/logo-cybrief.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/lottie/

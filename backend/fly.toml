# Cybrief backend — configuration Fly.io
# Nom d'app globalement unique : change-le si "cybrief-backend" est déjà pris.
app = "cybrief-backend"
primary_region = "cdg"  # Paris (proche audience FR)

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  # IA : DeepSeek par défaut (les clés sensibles passent par `fly secrets`)
  AI_PROVIDER = "deepseek"

[http_service]
  internal_port = 3000
  force_https = true
  # ── CRITIQUE : always-on pour que le cron node-cron tourne en continu ──
  auto_stop_machines = false     # ne jamais éteindre la machine
  auto_start_machines = true
  min_machines_running = 1       # garder au moins 1 instance vivante
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"   # confortable pour Node + Prisma ; 256mb serait juste
